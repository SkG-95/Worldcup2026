<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 660" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#0B1F3A"/>
    </marker>
    <marker id="arrd" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#5C6B7C" stroke-width="1.3"/>
    </marker>
  </defs>
  <rect width="980" height="660" fill="#FFFFFF"/>
  <text x="490" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#0B1F3A">Diagramme de séquence</text>
  <text x="490" y="50" text-anchor="middle" font-size="12" fill="#5C6B7C">Consultation des matchs et mise à jour des scores en temps réel</text>

  <!-- Lifeline headers -->
  <g font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    <rect x="40" y="66" width="150" height="38" rx="6" fill="#0B1F3A"/><text x="115" y="90">Utilisateur</text>
    <rect x="285" y="66" width="150" height="38" rx="6" fill="#0B1F3A"/><text x="360" y="90">Interface (UI)</text>
    <rect x="525" y="66" width="170" height="38" rx="6" fill="#0B1F3A"/><text x="610" y="84">Logique</text><text x="610" y="98" font-weight="normal" font-size="10">applicative</text>
    <rect x="780" y="66" width="160" height="38" rx="6" fill="#0B1F3A"/><text x="860" y="84">Service de</text><text x="860" y="98" font-weight="normal" font-size="10">données / API</text>
  </g>
  <!-- Lifelines -->
  <g stroke="#9AA7B6" stroke-width="1.2" stroke-dasharray="4 4">
    <line x1="115" y1="104" x2="115" y2="630"/>
    <line x1="360" y1="104" x2="360" y2="630"/>
    <line x1="610" y1="104" x2="610" y2="630"/>
    <line x1="860" y1="104" x2="860" y2="630"/>
  </g>

  <!-- Messages -->
  <g font-size="11.5" fill="#0B1F3A">
    <!-- m1 -->
    <line x1="115" y1="140" x2="358" y2="140" stroke="#0B1F3A" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="120" y="134">1. Ouvre l'application</text>
    <!-- m2 -->
    <line x1="360" y1="172" x2="608" y2="172" stroke="#0B1F3A" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="366" y="166">2. Demande les matchs</text>
    <!-- m3 -->
    <line x1="610" y1="204" x2="858" y2="204" stroke="#0B1F3A" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="616" y="198">3. getMatches()</text>
  </g>

  <!-- alt fragment -->
  <rect x="330" y="222" width="610" height="190" fill="none" stroke="#1652F0" stroke-width="1.3"/>
  <path d="M330,222 h64 v16 l-10,10 h-54 z" fill="#1652F0"/>
  <text x="338" y="236" font-size="10.5" font-weight="bold" fill="#FFFFFF">alt</text>
  <text x="402" y="236" font-size="10.5" fill="#1652F0">[ données disponibles ]</text>
  <g font-size="11.5" fill="#0B1F3A">
    <line x1="858" y1="258" x2="612" y2="258" stroke="#5C6B7C" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrd)"/>
    <text x="620" y="252">4. Liste des matchs</text>
    <rect x="600" y="278" width="20" height="26" rx="3" fill="#DCE6FF" stroke="#1652F0"/>
    <line x1="620" y1="285" x2="662" y2="285" stroke="#0B1F3A" stroke-width="1.4"/>
    <line x1="662" y1="285" x2="662" y2="298" stroke="#0B1F3A" stroke-width="1.4"/>
    <line x1="662" y1="298" x2="622" y2="298" stroke="#0B1F3A" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="668" y="291">5. Calcule classements &amp; match vedette</text>
    <line x1="608" y1="330" x2="362" y2="330" stroke="#5C6B7C" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrd)"/>
    <text x="370" y="324">6. Données prêtes</text>
    <line x1="358" y1="362" x2="117" y2="362" stroke="#5C6B7C" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrd)"/>
    <text x="120" y="356">7. Affiche matchs, classements, vedette</text>
  </g>
  <!-- alt divider -->
  <line x1="330" y1="378" x2="940" y2="378" stroke="#1652F0" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="402" y="392" font-size="10.5" fill="#1652F0">[ erreur service ]</text>
  <g font-size="11.5" fill="#0B1F3A">
    <line x1="608" y1="402" x2="362" y2="402" stroke="#5C6B7C" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrd)"/>
    <text x="366" y="408" fill="#C0392B">8. Message d'erreur → relance</text>
  </g>

  <!-- loop fragment -->
  <rect x="330" y="440" width="350" height="170" fill="none" stroke="#127A52" stroke-width="1.3"/>
  <path d="M330,440 h70 v16 l-10,10 h-60 z" fill="#127A52"/>
  <text x="338" y="454" font-size="10.5" font-weight="bold" fill="#FFFFFF">loop</text>
  <text x="408" y="454" font-size="10.5" fill="#127A52">[ toutes les 4 s ]</text>
  <g font-size="11.5" fill="#0B1F3A">
    <rect x="600" y="474" width="20" height="30" rx="3" fill="#D7F0E4" stroke="#127A52"/>
    <line x1="620" y1="482" x2="662" y2="482" stroke="#0B1F3A" stroke-width="1.4"/>
    <line x1="662" y1="482" x2="662" y2="496" stroke="#0B1F3A" stroke-width="1.4"/>
    <line x1="662" y1="496" x2="622" y2="496" stroke="#0B1F3A" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="382" y="478">9. Détecte les matchs en cours,</text>
    <text x="382" y="492">met à jour minute &amp; score</text>
    <line x1="608" y1="536" x2="362" y2="536" stroke="#5C6B7C" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrd)"/>
    <text x="370" y="530">10. Notifie le changement d'état</text>
    <line x1="358" y1="572" x2="117" y2="572" stroke="#0B1F3A" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="120" y="566">11. Rafraîchit les scores en direct</text>
  </g>
</svg>
