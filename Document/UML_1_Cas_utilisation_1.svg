<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 820" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="ext" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto">
      <path d="M1,1 L10,5 L1,9" fill="none" stroke="#5C6B7C" stroke-width="1.4"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="820" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="460" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#0B1F3A">Diagramme de cas d'utilisation</text>
  <text x="460" y="55" text-anchor="middle" font-size="12.5" fill="#5C6B7C">Application de suivi de la Coupe du Monde de football FIFA 2026</text>

  <!-- System boundary -->
  <rect x="282" y="80" width="356" height="590" rx="10" fill="#F7F9FC" stroke="#0B1F3A" stroke-width="1.6"/>
  <text x="460" y="103" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0B1F3A">Application de suivi — Coupe du Monde 2026</text>

  <!-- Actor: Utilisateur -->
  <g stroke="#0B1F3A" stroke-width="1.8" fill="none">
    <circle cx="92" cy="320" r="14" fill="#FFFFFF"/>
    <line x1="92" y1="334" x2="92" y2="378"/>
    <line x1="68" y1="350" x2="116" y2="350"/>
    <line x1="92" y1="378" x2="72" y2="408"/>
    <line x1="92" y1="378" x2="112" y2="408"/>
  </g>
  <text x="92" y="430" text-anchor="middle" font-size="13" font-weight="bold" fill="#0B1F3A">Utilisateur</text>

  <!-- Actor: Service de données / API -->
  <g stroke="#0B1F3A" stroke-width="1.8" fill="none">
    <circle cx="828" cy="320" r="14" fill="#FFFFFF"/>
    <line x1="828" y1="334" x2="828" y2="378"/>
    <line x1="804" y1="350" x2="852" y2="350"/>
    <line x1="828" y1="378" x2="808" y2="408"/>
    <line x1="828" y1="378" x2="848" y2="408"/>
  </g>
  <text x="828" y="430" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0B1F3A">Service de données</text>
  <text x="828" y="447" text-anchor="middle" font-size="11.5" fill="#5C6B7C">/ API (simulée)</text>

  <!-- Actor: Assistant IA -->
  <g stroke="#1FA971" stroke-width="1.8" fill="none">
    <circle cx="460" cy="702" r="14" fill="#FFFFFF"/>
    <line x1="460" y1="716" x2="460" y2="760"/>
    <line x1="436" y1="732" x2="484" y2="732"/>
    <line x1="460" y1="760" x2="440" y2="790"/>
    <line x1="460" y1="760" x2="480" y2="790"/>
  </g>
  <text x="460" y="808" text-anchor="middle" font-size="13" font-weight="bold" fill="#1FA971">Assistant IA</text>
  <text x="460" y="823" text-anchor="middle" font-size="10.5" fill="#5C6B7C">(simulé)</text>

  <!-- Association lines: Utilisateur -> use cases (drawn before ovals) -->
  <g stroke="#5C6B7C" stroke-width="1.3">
    <line x1="116" y1="356" x2="340" y2="158"/>
    <line x1="116" y1="358" x2="340" y2="290"/>
    <line x1="116" y1="360" x2="340" y2="420"/>
    <line x1="116" y1="362" x2="340" y2="486"/>
    <line x1="116" y1="364" x2="340" y2="552"/>
    <line x1="116" y1="366" x2="332" y2="617"/>
  </g>
  <!-- Association lines: Service de données -> use cases -->
  <g stroke="#5C6B7C" stroke-width="1.3">
    <line x1="804" y1="358" x2="580" y2="158"/>
    <line x1="804" y1="362" x2="580" y2="420"/>
  </g>
  <!-- Association line: Assistant IA -> UC8 -->
  <line x1="460" y1="688" x2="460" y2="643" stroke="#1FA971" stroke-width="1.3"/>

  <!-- Use case ovals -->
  <g>
    <!-- UC1 -->
    <ellipse cx="460" cy="150" rx="118" ry="26" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.6"/>
    <text x="460" y="155" text-anchor="middle" font-size="12.5" fill="#0B1F3A">Consulter les matchs par phase</text>
    <!-- UC2 -->
    <ellipse cx="460" cy="215" rx="100" ry="24" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.6"/>
    <text x="460" y="220" text-anchor="middle" font-size="12.5" fill="#0B1F3A">Filtrer par groupe</text>
    <!-- UC3 -->
    <ellipse cx="460" cy="282" rx="118" ry="26" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.6"/>
    <text x="460" y="287" text-anchor="middle" font-size="12.5" fill="#0B1F3A">Consulter le détail d'un match</text>
    <!-- UC4 -->
    <ellipse cx="460" cy="349" rx="118" ry="26" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.6"/>
    <text x="460" y="354" text-anchor="middle" font-size="12.5" fill="#0B1F3A">Suivre un match en temps réel</text>
    <!-- UC5 -->
    <ellipse cx="460" cy="416" rx="112" ry="26" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.6"/>
    <text x="460" y="421" text-anchor="middle" font-size="12.5" fill="#0B1F3A">Consulter les classements</text>
    <!-- UC6 -->
    <ellipse cx="460" cy="483" rx="112" ry="26" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.6"/>
    <text x="460" y="488" text-anchor="middle" font-size="12.5" fill="#0B1F3A">Consulter le tableau final</text>
    <!-- UC7 -->
    <ellipse cx="460" cy="550" rx="112" ry="26" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.6"/>
    <text x="460" y="555" text-anchor="middle" font-size="12.5" fill="#0B1F3A">Naviguer entre les phases</text>
    <!-- UC8 -->
    <ellipse cx="460" cy="617" rx="130" ry="26" fill="#FFFFFF" stroke="#1FA971" stroke-width="1.6"/>
    <text x="460" y="622" text-anchor="middle" font-size="12.5" fill="#0B1F3A">Interroger l'assistant IA</text>
  </g>

  <!-- Extend relationships (dashed, arrow to base use case) -->
  <g stroke="#5C6B7C" stroke-width="1.3" stroke-dasharray="5 4" fill="none">
    <line x1="460" y1="191" x2="460" y2="178" marker-end="url(#ext)"/>
    <line x1="460" y1="323" x2="460" y2="310" marker-end="url(#ext)"/>
  </g>
  <text x="472" y="187" font-size="10.5" fill="#5C6B7C" font-style="italic">«extend»</text>
  <text x="472" y="319" font-size="10.5" fill="#5C6B7C" font-style="italic">«extend»</text>

  <!-- Legend -->
  <g font-size="11" fill="#5C6B7C">
    <line x1="260" y1="792" x2="290" y2="792" stroke="#5C6B7C" stroke-width="1.3"/>
    <text x="296" y="796">Association</text>
    <line x1="410" y1="792" x2="440" y2="792" stroke="#5C6B7C" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ext)"/>
    <text x="448" y="796">Extension (« extend »)</text>
  </g>
</svg>
