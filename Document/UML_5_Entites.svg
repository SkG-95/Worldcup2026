<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="Arial, Helvetica, sans-serif">
  <rect width="960" height="470" fill="#FFFFFF"/>
  <text x="480" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#0B1F3A">Diagramme des entités (modèle entité-association)</text>

  <!-- connection lines -->
  <g stroke="#5C6B7C" stroke-width="1.3">
    <!-- APPARTENIR -->
    <line x1="150" y1="120" x2="150" y2="150"/>
    <line x1="150" y1="206" x2="150" y2="236"/>
    <!-- JOUER dom -->
    <line x1="240" y1="278" x2="237" y2="278"/>
    <line x1="237" y1="278" x2="237" y2="278"/>
    <line x1="240" y1="278" x2="240" y2="278"/>
    <line x1="240" y1="278" x2="246" y2="278"/>
    <line x1="240" y1="278" x2="246" y2="278"/>
    <line x1="240" y1="278" x2="248" y2="278"/>
    <line x1="240" y1="278" x2="246" y2="278"/>
    <line x1="240" y1="278" x2="235" y2="278"/>
    <line x1="240" y1="278" x2="236" y2="278"/>
    <line x1="240" y1="278" x2="237" y2="278"/>
    <line x1="240" y1="278" x2="237" y2="278"/>
    <line x1="240" y1="278" x2="235" y2="278"/>
    <line x1="248" y1="278" x2="237" y2="278"/>
    <line x1="343" y1="278" x2="335" y2="278"/>
    <!-- JOUER ext -->
    <line x1="248" y1="356" x2="237" y2="356"/>
    <line x1="343" y1="356" x2="335" y2="356"/>
    <!-- RATTACHER -->
    <line x1="240" y1="104" x2="340" y2="160"/>
    <line x1="392" y1="194" x2="405" y2="236"/>
    <!-- CONCERNER -->
    <line x1="490" y1="236" x2="600" y2="190"/>
    <line x1="668" y1="150" x2="812" y2="120"/>
    <!-- SE_JOUER -->
    <line x1="530" y1="312" x2="576" y2="312"/>
    <line x1="682" y1="312" x2="722" y2="300"/>
  </g>

  <!-- cardinalities -->
  <g font-size="10.5" fill="#5C6B7C" font-weight="bold">
    <text x="156" y="138">1,n</text><text x="156" y="232">1,1</text>
    <text x="250" y="272">0,n</text><text x="320" y="272">1,1</text>
    <text x="250" y="350">0,n</text><text x="320" y="350">1,1</text>
    <text x="244" y="120">0,n</text><text x="408" y="226">0,1</text>
    <text x="496" y="228">1,1</text><text x="788" y="132">1,n</text>
    <text x="538" y="306">1,1</text><text x="690" y="306">0,n</text>
  </g>

  <!-- association ellipses -->
  <g fill="#EAF0FF" stroke="#1652F0" stroke-width="1.4">
    <ellipse cx="150" cy="178" rx="54" ry="28"/>
    <ellipse cx="290" cy="278" rx="54" ry="26"/>
    <ellipse cx="290" cy="356" rx="54" ry="26"/>
    <ellipse cx="392" cy="166" rx="54" ry="28"/>
    <ellipse cx="634" cy="166" rx="56" ry="28"/>
    <ellipse cx="629" cy="312" rx="54" ry="26"/>
  </g>
  <g font-size="10.5" fill="#0B1F3A" text-anchor="middle" font-weight="bold">
    <text x="150" y="182">APPARTENIR</text>
    <text x="290" y="282">JOUER (dom.)</text>
    <text x="290" y="360">JOUER (ext.)</text>
    <text x="392" y="170">RATTACHER</text>
    <text x="634" y="170">CONCERNER</text>
    <text x="629" y="316">SE JOUER</text>
  </g>

  <!-- entities -->
  <!-- GROUPE -->
  <g>
    <rect x="60" y="58" width="180" height="62" rx="2" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
    <rect x="60" y="58" width="180" height="22" fill="#0B1F3A"/>
    <text x="150" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">GROUPE</text>
    <g font-size="11" fill="#0B1F3A">
      <text x="68" y="96"><tspan text-decoration="underline">#idGroupe</tspan></text>
      <text x="68" y="112">libellé</text>
    </g>
  </g>
  <!-- PHASE -->
  <g>
    <rect x="736" y="58" width="170" height="62" rx="2" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
    <rect x="736" y="58" width="170" height="22" fill="#0B1F3A"/>
    <text x="821" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">PHASE</text>
    <g font-size="11" fill="#0B1F3A">
      <text x="744" y="96"><tspan text-decoration="underline">#idPhase</tspan></text>
      <text x="744" y="112">libellé</text>
    </g>
  </g>
  <!-- ÉQUIPE -->
  <g>
    <rect x="48" y="236" width="192" height="128" rx="2" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
    <rect x="48" y="236" width="192" height="22" fill="#0B1F3A"/>
    <text x="144" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">ÉQUIPE</text>
    <g font-size="11" fill="#0B1F3A">
      <text x="56" y="274"><tspan text-decoration="underline">#idEquipe</tspan></text>
      <text x="56" y="290">nom</text>
      <text x="56" y="306">code</text>
      <text x="56" y="322">drapeau</text>
      <text x="56" y="338">confédération</text>
    </g>
  </g>
  <!-- MATCH -->
  <g>
    <rect x="330" y="236" width="200" height="148" rx="2" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
    <rect x="330" y="236" width="200" height="22" fill="#0B1F3A"/>
    <text x="430" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">MATCH</text>
    <g font-size="11" fill="#0B1F3A">
      <text x="338" y="274"><tspan text-decoration="underline">#idMatch</tspan></text>
      <text x="338" y="290">dateHeure</text>
      <text x="338" y="306">statut</text>
      <text x="338" y="322">scoreDom</text>
      <text x="338" y="338">scoreExt</text>
      <text x="338" y="354">minute</text>
    </g>
  </g>
  <!-- STADE -->
  <g>
    <rect x="722" y="236" width="184" height="84" rx="2" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
    <rect x="722" y="236" width="184" height="22" fill="#0B1F3A"/>
    <text x="814" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">STADE</text>
    <g font-size="11" fill="#0B1F3A">
      <text x="730" y="274"><tspan text-decoration="underline">#idStade</tspan></text>
      <text x="730" y="290">nom</text>
      <text x="730" y="306">ville</text>
    </g>
  </g>
</svg>
