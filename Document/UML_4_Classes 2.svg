<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 980" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="dep" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto"><path d="M1,1 L10,5 L1,9" fill="none" stroke="#5C6B7C" stroke-width="1.3"/></marker>
  </defs>
  <rect width="960" height="980" fill="#FFFFFF"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#0B1F3A">Diagramme de classes</text>

  <!-- ============ relationships (drawn first) ============ -->
  <g stroke="#5C6B7C" stroke-width="1.3" fill="none">
    <!-- Group aggregation Team -->
    <line x1="155" y1="300" x2="155" y2="236"/>
    <polygon points="155,290 147,300 155,310 163,300" fill="#FFFFFF" stroke="#5C6B7C"/>
    <!-- Match - Team domicile -->
    <line x1="262" y1="150" x2="372" y2="150"/>
    <!-- Match - Team exterieur -->
    <line x1="262" y1="186" x2="372" y2="186"/>
    <!-- Match - Group rattaché -->
    <line x1="262" y1="334" x2="372" y2="300"/>
    <!-- Standing - Group -->
    <line x1="430" y1="430" x2="205" y2="372"/>
  </g>
  <!-- dependencies (dashed) -->
  <g stroke="#5C6B7C" stroke-width="1.3" stroke-dasharray="5 4" fill="none">
    <line x1="628" y1="206" x2="720" y2="350" marker-end="url(#dep)"/>
    <line x1="628" y1="258" x2="720" y2="500" marker-end="url(#dep)"/>
    <line x1="720" y1="134" x2="630" y2="120" marker-end="url(#dep)"/>
  </g>
  <!-- multiplicities & role labels -->
  <g font-size="10.5" fill="#5C6B7C">
    <text x="160" y="252">4</text><text x="160" y="296">1</text><text x="120" y="276" font-style="italic">contient</text>
    <text x="300" y="144" font-style="italic">«domicile» 1</text><text x="345" y="163">0..*</text>
    <text x="300" y="180" font-style="italic">«extérieur» 1</text><text x="345" y="199">0..*</text>
    <text x="268" y="324">0..1</text><text x="300" y="312" font-style="italic">rattaché à</text>
    <text x="300" y="396" font-style="italic">classement</text><text x="210" y="388">1</text><text x="430" y="446">4</text>
    <text x="650" y="280" font-style="italic" fill="#5C6B7C">«utilise»</text>
    <text x="648" y="118" font-style="italic">«fournit»</text>
  </g>

  <!-- ============ classes ============ -->
  <!-- Team -->
  <g>
    <rect x="48" y="104" width="214" height="132" rx="3" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.5"/>
    <rect x="48" y="104" width="214" height="26" rx="3" fill="#0B1F3A"/>
    <text x="155" y="122" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">Équipe (Team)</text>
    <line x1="48" y1="130" x2="262" y2="130" stroke="#1652F0"/>
    <g font-size="11" fill="#0B1F3A">
      <text x="56" y="150">- id : String</text>
      <text x="56" y="166">- nom : String</text>
      <text x="56" y="182">- code : String</text>
      <text x="56" y="198">- drapeau : String</text>
      <text x="56" y="214">- confédération : String</text>
    </g>
  </g>
  <!-- Group -->
  <g>
    <rect x="48" y="300" width="214" height="72" rx="3" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.5"/>
    <rect x="48" y="300" width="214" height="26" rx="3" fill="#0B1F3A"/>
    <text x="155" y="318" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">Groupe (Group)</text>
    <line x1="48" y1="326" x2="262" y2="326" stroke="#1652F0"/>
    <g font-size="11" fill="#0B1F3A">
      <text x="56" y="346">- id : String  (A … L)</text>
      <text x="56" y="362">- libellé : String</text>
    </g>
  </g>
  <!-- Match -->
  <g>
    <rect x="372" y="78" width="256" height="262" rx="3" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.5"/>
    <rect x="372" y="78" width="256" height="26" rx="3" fill="#0B1F3A"/>
    <text x="500" y="96" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">Match</text>
    <line x1="372" y1="104" x2="628" y2="104" stroke="#1652F0"/>
    <g font-size="11" fill="#0B1F3A">
      <text x="380" y="122">- id : String</text>
      <text x="380" y="138">- journée : int</text>
      <text x="380" y="154">- dateHeure : DateTime</text>
      <text x="380" y="170">- stade : String</text>
      <text x="380" y="186">- ville : String</text>
      <text x="380" y="202">- scoreDom : int</text>
      <text x="380" y="218">- scoreExt : int</text>
      <text x="380" y="234">- minute : int</text>
      <text x="380" y="250">- statut : MatchStatus</text>
      <text x="380" y="266">- phase : Phase</text>
    </g>
    <line x1="372" y1="276" x2="628" y2="276" stroke="#1652F0"/>
    <g font-size="11" fill="#0B1F3A">
      <text x="380" y="294">+ estEnDirect() : bool</text>
      <text x="380" y="310">+ estTerminé() : bool</text>
      <text x="380" y="326">+ vainqueur() : Équipe</text>
    </g>
  </g>
  <!-- Standing -->
  <g>
    <rect x="360" y="430" width="250" height="200" rx="3" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.5"/>
    <rect x="360" y="430" width="250" height="26" rx="3" fill="#0B1F3A"/>
    <text x="485" y="448" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">Classement (Standing)</text>
    <line x1="360" y1="456" x2="610" y2="456" stroke="#1652F0"/>
    <g font-size="11" fill="#0B1F3A">
      <text x="368" y="476">- equipe : Équipe</text>
      <text x="368" y="492">- joués : int</text>
      <text x="368" y="508">- gagnés : int</text>
      <text x="368" y="524">- nuls : int</text>
      <text x="368" y="540">- perdus : int</text>
      <text x="368" y="556">- butsPour : int</text>
      <text x="368" y="572">- butsContre : int</text>
      <text x="368" y="588">- points : int</text>
    </g>
    <line x1="360" y1="598" x2="610" y2="598" stroke="#1652F0"/>
    <text x="368" y="618" font-size="11" fill="#0B1F3A">+ différence() : int</text>
  </g>
  <!-- WorldCupApi -->
  <g>
    <rect x="720" y="92" width="216" height="86" rx="3" fill="#FFFFFF" stroke="#127A52" stroke-width="1.5"/>
    <rect x="720" y="92" width="216" height="40" rx="3" fill="#127A52"/>
    <text x="828" y="108" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«service»</text>
    <text x="828" y="124" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">WorldCupApi</text>
    <line x1="720" y1="132" x2="936" y2="132" stroke="#127A52"/>
    <text x="728" y="154" font-size="11" fill="#0B1F3A">+ getMatches() : Match [*]</text>
  </g>
  <!-- MatchStatus enum -->
  <g>
    <rect x="720" y="300" width="200" height="104" rx="3" fill="#FFFFFF" stroke="#C8922A" stroke-width="1.5"/>
    <rect x="720" y="300" width="200" height="40" rx="3" fill="#C8922A"/>
    <text x="820" y="316" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«enumeration»</text>
    <text x="820" y="332" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">MatchStatus</text>
    <line x1="720" y1="340" x2="920" y2="340" stroke="#C8922A"/>
    <g font-size="11" fill="#0B1F3A">
      <text x="728" y="360">À_VENIR</text>
      <text x="728" y="376">EN_COURS</text>
      <text x="728" y="392">TERMINÉ</text>
    </g>
  </g>
  <!-- Phase enum -->
  <g>
    <rect x="720" y="440" width="200" height="176" rx="3" fill="#FFFFFF" stroke="#C8922A" stroke-width="1.5"/>
    <rect x="720" y="440" width="200" height="40" rx="3" fill="#C8922A"/>
    <text x="820" y="456" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«enumeration»</text>
    <text x="820" y="472" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">Phase</text>
    <line x1="720" y1="480" x2="920" y2="480" stroke="#C8922A"/>
    <g font-size="11" fill="#0B1F3A">
      <text x="728" y="500">GROUPES</text>
      <text x="728" y="516">SEIZIEMES</text>
      <text x="728" y="532">HUITIEMES</text>
      <text x="728" y="548">QUARTS</text>
      <text x="728" y="564">DEMIES</text>
      <text x="728" y="580">PETITE_FINALE</text>
      <text x="728" y="596">FINALE</text>
    </g>
  </g>

  <!-- Match -> AssistantIA dependency -->
  <g stroke="#FF2E6E" stroke-width="1.3" stroke-dasharray="5 4" fill="none">
    <line x1="500" y1="340" x2="500" y2="700" marker-end="url(#dep)"/>
  </g>
  <text x="512" y="520" font-size="10.5" font-style="italic" fill="#FF2E6E">«utilise les données»</text>

  <!-- AssistantIA service class (nouveau) -->
  <g>
    <rect x="372" y="700" width="256" height="86" rx="3" fill="#FFFFFF" stroke="#FF2E6E" stroke-width="1.6"/>
    <rect x="372" y="700" width="256" height="40" rx="3" fill="#FF2E6E"/>
    <text x="500" y="716" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«service» (simulé)</text>
    <text x="500" y="732" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">AssistantIA</text>
    <line x1="372" y1="740" x2="628" y2="740" stroke="#FF2E6E"/>
    <text x="380" y="760" font-size="11" fill="#0B1F3A">+ repondre(question, matchs) : String</text>
  </g>

  <!-- Predictor service -->
  <g>
    <rect x="40" y="700" width="220" height="72" rx="3" fill="#FFFFFF" stroke="#FF2E6E" stroke-width="1.4"/>
    <rect x="40" y="700" width="220" height="38" rx="3" fill="#FF2E6E"/>
    <text x="150" y="716" text-anchor="middle" font-size="10" fill="#FFFFFF" font-style="italic">«service» (simulé)</text>
    <text x="150" y="730" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">PredictMatch</text>
    <line x1="40" y1="738" x2="260" y2="738" stroke="#FF2E6E"/>
    <text x="48" y="758" font-size="11" fill="#0B1F3A">+ prédire(m, matchs) : {home,draw,away}</text>
  </g>
  <!-- AnalyzeTeam service -->
  <g>
    <rect x="280" y="700" width="220" height="72" rx="3" fill="#FFFFFF" stroke="#FF2E6E" stroke-width="1.4"/>
    <rect x="280" y="700" width="220" height="38" rx="3" fill="#FF2E6E"/>
    <text x="390" y="716" text-anchor="middle" font-size="10" fill="#FFFFFF" font-style="italic">«service» (simulé)</text>
    <text x="390" y="730" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">AnalyzeTeam</text>
    <line x1="280" y1="738" x2="500" y2="738" stroke="#FF2E6E"/>
    <text x="288" y="758" font-size="11" fill="#0B1F3A">+ analyser(code, matchs) : Analyse</text>
  </g>
  <!-- LiveCommentary component -->
  <g>
    <rect x="520" y="700" width="220" height="72" rx="3" fill="#FFFFFF" stroke="#C8922A" stroke-width="1.4"/>
    <rect x="520" y="700" width="220" height="38" rx="3" fill="#C8922A"/>
    <text x="630" y="716" text-anchor="middle" font-size="10" fill="#FFFFFF" font-style="italic">«composant»</text>
    <text x="630" y="730" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">LiveCommentary</text>
    <line x1="520" y1="738" x2="740" y2="738" stroke="#C8922A"/>
    <text x="528" y="758" font-size="11" fill="#0B1F3A">+ generer(m : Match) : String[]</text>
  </g>
  <!-- PlayerCard component -->
  <g>
    <rect x="760" y="700" width="185" height="72" rx="3" fill="#FFFFFF" stroke="#C8922A" stroke-width="1.4"/>
    <rect x="760" y="700" width="185" height="38" rx="3" fill="#C8922A"/>
    <text x="852" y="716" text-anchor="middle" font-size="10" fill="#FFFFFF" font-style="italic">«composant»</text>
    <text x="852" y="730" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">PlayerCard</text>
    <line x1="760" y1="738" x2="945" y2="738" stroke="#C8922A"/>
    <text x="768" y="758" font-size="11" fill="#0B1F3A">- note, pac, tir, pas : int</text>
  </g>
  <!-- Dependency lines -->
  <g stroke="#FF2E6E" stroke-width="1.2" stroke-dasharray="5 4" fill="none">
    <line x1="500" y1="786" x2="500" y2="756"/>
    <line x1="150" y1="786" x2="150" y2="756"/>
    <line x1="630" y1="786" x2="630" y2="756"/>
  </g>
  <!-- New level label -->
  <text x="480" y="820" text-anchor="middle" font-size="11" fill="#5C6B7C" font-style="italic">Nouveaux composants/services IA — version FIFA Ultimate Team</text>

  <!-- New classes from FIFA refactor -->
  <!-- PlayerCard -->
  <g>
    <rect x="40" y="820" width="200" height="88" rx="3" fill="#FFFFFF" stroke="#FF2E6E" stroke-width="1.6"/>
    <rect x="40" y="820" width="200" height="40" rx="3" fill="#FF2E6E"/>
    <text x="58" y="836" font-size="10" fill="#FFFFFF" font-style="italic">«composant»</text>
    <text x="140" y="852" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">PlayerCard</text>
    <line x1="40" y1="860" x2="240" y2="860" stroke="#FF2E6E"/>
    <text x="48" y="878" font-size="11" fill="#0B1F3A">- note : int</text>
    <text x="48" y="894" font-size="11" fill="#0B1F3A">- pac,tir,pas,dri,def,phy : int</text>
  </g>

  <!-- TeamCard -->
  <g>
    <rect x="260" y="820" width="200" height="88" rx="3" fill="#FFFFFF" stroke="#FF2E6E" stroke-width="1.6"/>
    <rect x="260" y="820" width="200" height="40" rx="3" fill="#FF2E6E"/>
    <text x="278" y="836" font-size="10" fill="#FFFFFF" font-style="italic">«composant»</text>
    <text x="360" y="852" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">TeamCard</text>
    <line x1="260" y1="860" x2="460" y2="860" stroke="#FF2E6E"/>
    <text x="268" y="878" font-size="11" fill="#0B1F3A">- variant : gold|silver|green|bronze</text>
    <text x="268" y="894" font-size="11" fill="#0B1F3A">+ render(code, matches)</text>
  </g>

  <!-- LiveCommentary -->
  <g>
    <rect x="480" y="820" width="220" height="88" rx="3" fill="#FFFFFF" stroke="#FF2E6E" stroke-width="1.6"/>
    <rect x="480" y="820" width="220" height="40" rx="3" fill="#FF2E6E"/>
    <text x="498" y="836" font-size="10" fill="#FFFFFF" font-style="italic">«composant IA»</text>
    <text x="590" y="852" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">LiveCommentary</text>
    <line x1="480" y1="860" x2="700" y2="860" stroke="#FF2E6E"/>
    <text x="488" y="878" font-size="11" fill="#0B1F3A">+ comments : String[]</text>
    <text x="488" y="894" font-size="11" fill="#0B1F3A">+ genererCommentaire(minute, score)</text>
  </g>

  <!-- predictMatch -->
  <g>
    <rect x="720" y="820" width="220" height="88" rx="3" fill="#FFFFFF" stroke="#C8922A" stroke-width="1.6"/>
    <rect x="720" y="820" width="220" height="40" rx="3" fill="#C8922A"/>
    <text x="738" y="836" font-size="10" fill="#FFFFFF" font-style="italic">«service IA simulé»</text>
    <text x="830" y="852" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">predictMatch</text>
    <line x1="720" y1="860" x2="940" y2="860" stroke="#C8922A"/>
    <text x="728" y="878" font-size="11" fill="#0B1F3A">+ home : int  (% victoire)</text>
    <text x="728" y="894" font-size="11" fill="#0B1F3A">+ draw : int  + away : int</text>
  </g>

  <!-- relation lines from Match to new components -->
  <g stroke="#FF2E6E" stroke-width="1.2" stroke-dasharray="4 3" fill="none">
    <line x1="500" y1="340" x2="140" y2="820"/>
    <line x1="500" y1="340" x2="360" y2="820"/>
    <line x1="500" y1="340" x2="590" y2="820"/>
    <line x1="500" y1="340" x2="830" y2="820"/>
  </g>
  <text x="220" y="590" font-size="9.5" fill="#FF2E6E" font-style="italic" transform="rotate(-55 220 590)">«utilise»</text>
</svg>
