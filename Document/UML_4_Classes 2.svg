<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="dep" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto"><path d="M1,1 L10,5 L1,9" fill="none" stroke="#5C6B7C" stroke-width="1.3"/></marker>
  </defs>
  <rect width="1440" height="960" fill="#FFFFFF"/>
  <text x="720" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#0B1F3A">Diagramme de classes — Suivi Coupe du Monde FIFA 2026</text>

  <!-- ============ relations (tracées sous les boîtes) ============ -->
  <!-- Agrégation Groupe ◇— Équipe -->
  <g stroke="#5C6B7C" stroke-width="1.4" fill="none">
    <line x1="170" y1="220" x2="170" y2="290"/>
    <line x1="170" y1="374" x2="170" y2="430"/>
    <line x1="290" y1="120" x2="480" y2="120"/>
    <line x1="290" y1="160" x2="480" y2="160"/>
    <line x1="290" y1="330" x2="480" y2="330"/>
  </g>
  <polygon points="170,290 162,278 170,266 178,278" fill="#FFFFFF" stroke="#5C6B7C" stroke-width="1.4"/>
  <!-- dépendances (pointillés) -->
  <g stroke="#5C6B7C" stroke-width="1.3" stroke-dasharray="5 4" fill="none">
    <line x1="850" y1="110" x2="760" y2="110" marker-end="url(#dep)"/>
    <path d="M760,200 L1125,200 L1125,128 L1150,128" marker-end="url(#dep)"/>
    <line x1="760" y1="340" x2="1150" y2="340" marker-end="url(#dep)"/>
    <line x1="620" y1="500" x2="620" y2="400" marker-end="url(#dep)"/>
  </g>

  <!-- multiplicités et rôles -->
  <g font-size="11" fill="#334155">
    <text x="182" y="242" font-weight="bold">4</text>
    <text x="98" y="258" font-style="italic">contient</text>
    <text x="182" y="286" font-weight="bold">1</text>
    <text x="182" y="392" font-weight="bold">1</text>
    <text x="88" y="406" font-style="italic">classement</text>
    <text x="182" y="426" font-weight="bold">4</text>
    <text x="330" y="112" font-style="italic">«domicile»</text>
    <text x="298" y="136" font-weight="bold">1</text>
    <text x="440" y="136" font-weight="bold">0..*</text>
    <text x="330" y="152" font-style="italic">«extérieur»</text>
    <text x="298" y="176" font-weight="bold">1</text>
    <text x="440" y="176" font-weight="bold">0..*</text>
    <text x="330" y="322" font-style="italic">rattaché à</text>
    <text x="298" y="346" font-weight="bold">0..*</text>
    <text x="436" y="346" font-weight="bold">0..1</text>
    <text x="805" y="98" text-anchor="middle" font-style="italic">«fournit»</text>
    <text x="950" y="192" font-style="italic">«utilise»</text>
    <text x="940" y="332" font-style="italic">«utilise»</text>
    <text x="632" y="456" font-style="italic">«utilisent les données»</text>
  </g>

  <!-- ============ classes du domaine (bleu) ============ -->
  <!-- Équipe -->
  <g>
    <rect x="50" y="70" width="240" height="150" rx="3" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.5"/>
    <rect x="50" y="70" width="240" height="30" rx="3" fill="#0B1F3A"/>
    <text x="170" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Équipe (Team)</text>
    <g font-size="11.5" fill="#0B1F3A">
      <text x="60" y="118">- id : String</text>
      <text x="60" y="140">- nom : String</text>
      <text x="60" y="162">- code : String</text>
      <text x="60" y="184">- drapeau : String</text>
      <text x="60" y="206">- confédération : String</text>
    </g>
  </g>
  <!-- Groupe -->
  <g>
    <rect x="50" y="290" width="240" height="84" rx="3" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.5"/>
    <rect x="50" y="290" width="240" height="30" rx="3" fill="#0B1F3A"/>
    <text x="170" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Groupe (Group)</text>
    <g font-size="11.5" fill="#0B1F3A">
      <text x="60" y="338">- id : String (A … L)</text>
      <text x="60" y="360">- libellé : String</text>
    </g>
  </g>
  <!-- Classement -->
  <g>
    <rect x="50" y="430" width="240" height="242" rx="3" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.5"/>
    <rect x="50" y="430" width="240" height="30" rx="3" fill="#0B1F3A"/>
    <text x="170" y="450" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Classement (Standing)</text>
    <g font-size="11.5" fill="#0B1F3A">
      <text x="60" y="478">- équipe : Équipe</text>
      <text x="60" y="500">- joués : int</text>
      <text x="60" y="522">- gagnés : int</text>
      <text x="60" y="544">- nuls : int</text>
      <text x="60" y="566">- perdus : int</text>
      <text x="60" y="588">- butsPour : int</text>
      <text x="60" y="610">- butsContre : int</text>
      <text x="60" y="632">- points : int</text>
    </g>
    <line x1="50" y1="640" x2="290" y2="640" stroke="#1652F0"/>
    <text x="60" y="660" font-size="11.5" fill="#0B1F3A">+ différence() : int</text>
  </g>
  <!-- Match -->
  <g>
    <rect x="480" y="70" width="280" height="330" rx="3" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.5"/>
    <rect x="480" y="70" width="280" height="30" rx="3" fill="#0B1F3A"/>
    <text x="620" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Match</text>
    <g font-size="11.5" fill="#0B1F3A">
      <text x="490" y="118">- id : String</text>
      <text x="490" y="140">- journée : int</text>
      <text x="490" y="162">- dateHeure : DateTime</text>
      <text x="490" y="184">- stade : String</text>
      <text x="490" y="206">- ville : String</text>
      <text x="490" y="228">- scoreDom : int</text>
      <text x="490" y="250">- scoreExt : int</text>
      <text x="490" y="272">- minute : int</text>
      <text x="490" y="294">- statut : MatchStatus</text>
      <text x="490" y="316">- phase : Phase</text>
    </g>
    <line x1="480" y1="324" x2="760" y2="324" stroke="#1652F0"/>
    <g font-size="11.5" fill="#0B1F3A">
      <text x="490" y="344">+ estEnDirect() : bool</text>
      <text x="490" y="366">+ estTerminé() : bool</text>
      <text x="490" y="388">+ vainqueur() : Équipe</text>
    </g>
  </g>

  <!-- ============ service de données (vert) ============ -->
  <g>
    <rect x="850" y="70" width="250" height="96" rx="3" fill="#FFFFFF" stroke="#127A52" stroke-width="1.5"/>
    <rect x="850" y="70" width="250" height="44" rx="3" fill="#127A52"/>
    <text x="975" y="87" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«service»</text>
    <text x="975" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">WorldCupApi</text>
    <text x="860" y="140" font-size="11.5" fill="#0B1F3A">+ getMatches() : Match [*]</text>
  </g>

  <!-- ============ énumérations (ambre) ============ -->
  <g>
    <rect x="1150" y="70" width="250" height="118" rx="3" fill="#FFFFFF" stroke="#C8922A" stroke-width="1.5"/>
    <rect x="1150" y="70" width="250" height="44" rx="3" fill="#C8922A"/>
    <text x="1275" y="87" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«enumeration»</text>
    <text x="1275" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">MatchStatus</text>
    <g font-size="11.5" fill="#0B1F3A">
      <text x="1160" y="134">À_VENIR</text>
      <text x="1160" y="156">EN_COURS</text>
      <text x="1160" y="178">TERMINÉ</text>
    </g>
  </g>
  <g>
    <rect x="1150" y="240" width="250" height="206" rx="3" fill="#FFFFFF" stroke="#C8922A" stroke-width="1.5"/>
    <rect x="1150" y="240" width="250" height="44" rx="3" fill="#C8922A"/>
    <text x="1275" y="257" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«enumeration»</text>
    <text x="1275" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Phase</text>
    <g font-size="11.5" fill="#0B1F3A">
      <text x="1160" y="304">GROUPES</text>
      <text x="1160" y="326">SEIZIÈMES</text>
      <text x="1160" y="348">HUITIÈMES</text>
      <text x="1160" y="370">QUARTS</text>
      <text x="1160" y="392">DEMI_FINALES</text>
      <text x="1160" y="414">PETITE_FINALE</text>
      <text x="1160" y="436">FINALE</text>
    </g>
  </g>

  <!-- ============ cadre services IA & composants ============ -->
  <g>
    <rect x="400" y="500" width="700" height="400" rx="4" fill="none" stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="7 5"/>
    <text x="418" y="524" font-size="12" font-weight="bold" fill="#64748B" font-style="italic">Services IA &amp; composants React consommant les matchs</text>
  </g>
  <!-- AssistantIA -->
  <g>
    <rect x="430" y="540" width="310" height="96" rx="3" fill="#FFFFFF" stroke="#D6336C" stroke-width="1.5"/>
    <rect x="430" y="540" width="310" height="44" rx="3" fill="#D6336C"/>
    <text x="585" y="557" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«service IA» — Gemini (serverless) + repli simulé</text>
    <text x="585" y="574" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">AssistantIA</text>
    <text x="440" y="610" font-size="11.5" fill="#0B1F3A">+ répondre(question, contexte) : String</text>
  </g>
  <!-- PredictMatch -->
  <g>
    <rect x="770" y="540" width="300" height="96" rx="3" fill="#FFFFFF" stroke="#D6336C" stroke-width="1.5"/>
    <rect x="770" y="540" width="300" height="44" rx="3" fill="#D6336C"/>
    <text x="920" y="557" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«service IA simulé»</text>
    <text x="920" y="574" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">PredictMatch</text>
    <text x="780" y="610" font-size="11.5" fill="#0B1F3A">+ prédire(match, matchs) : {home, draw, away}</text>
  </g>
  <!-- AnalyzeTeam -->
  <g>
    <rect x="430" y="660" width="310" height="96" rx="3" fill="#FFFFFF" stroke="#D6336C" stroke-width="1.5"/>
    <rect x="430" y="660" width="310" height="44" rx="3" fill="#D6336C"/>
    <text x="585" y="677" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«service IA simulé»</text>
    <text x="585" y="694" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">AnalyzeTeam</text>
    <text x="440" y="730" font-size="11.5" fill="#0B1F3A">+ analyser(code, matchs) : Analyse</text>
  </g>
  <!-- LiveCommentary -->
  <g>
    <rect x="770" y="660" width="300" height="96" rx="3" fill="#FFFFFF" stroke="#5C6B7C" stroke-width="1.5"/>
    <rect x="770" y="660" width="300" height="44" rx="3" fill="#5C6B7C"/>
    <text x="920" y="677" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«composant»</text>
    <text x="920" y="694" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">LiveCommentary</text>
    <text x="780" y="730" font-size="11.5" fill="#0B1F3A">+ générer(match) : String [*]</text>
  </g>
  <!-- TeamCard -->
  <g>
    <rect x="430" y="780" width="310" height="96" rx="3" fill="#FFFFFF" stroke="#5C6B7C" stroke-width="1.5"/>
    <rect x="430" y="780" width="310" height="44" rx="3" fill="#5C6B7C"/>
    <text x="585" y="797" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«composant»</text>
    <text x="585" y="814" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">TeamCard</text>
    <text x="440" y="850" font-size="11.5" fill="#0B1F3A">- variant : gold | silver | bronze</text>
  </g>
  <!-- PlayerCard -->
  <g>
    <rect x="770" y="780" width="300" height="96" rx="3" fill="#FFFFFF" stroke="#5C6B7C" stroke-width="1.5"/>
    <rect x="770" y="780" width="300" height="44" rx="3" fill="#5C6B7C"/>
    <text x="920" y="797" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-style="italic">«composant»</text>
    <text x="920" y="814" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">PlayerCard</text>
    <text x="780" y="850" font-size="11.5" fill="#0B1F3A">- note, pac, tir, pas, dri, déf, phy : int</text>
  </g>

  <!-- ============ légende ============ -->
  <g font-size="11.5" fill="#334155">
    <rect x="50" y="722" width="14" height="14" fill="#FFFFFF" stroke="#1652F0" stroke-width="1.5"/>
    <text x="72" y="734">Classes du domaine</text>
    <rect x="50" y="748" width="14" height="14" fill="#FFFFFF" stroke="#127A52" stroke-width="1.5"/>
    <text x="72" y="760">Service de données</text>
    <rect x="50" y="774" width="14" height="14" fill="#FFFFFF" stroke="#C8922A" stroke-width="1.5"/>
    <text x="72" y="786">Énumérations</text>
    <rect x="50" y="800" width="14" height="14" fill="#FFFFFF" stroke="#D6336C" stroke-width="1.5"/>
    <text x="72" y="812">Services IA</text>
    <rect x="50" y="826" width="14" height="14" fill="#FFFFFF" stroke="#5C6B7C" stroke-width="1.5"/>
    <text x="72" y="838">Composants React</text>
    <text x="50" y="872" font-style="italic" fill="#64748B">◇ agrégation · — association · - -&gt; dépendance</text>
  </g>
</svg>
