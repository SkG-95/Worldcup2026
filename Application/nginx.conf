server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Application mono-page (SPA) : toute route inconnue retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fichiers statiques : mise en cache longue durée (immuables, hashés par Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
